<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BatoKod – 3026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛵</text></svg>" />

    <!-- Préconnexion Google Fonts pour éliminer la latence DNS/TCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Chargement non-bloquant des polices via media trick -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback si JS désactivé -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" />
    </noscript>

    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Script différé : le navigateur le télécharge en parallèle, l'exécute après le DOM -->
    <script src="assets/js/script.js" defer></script>
  </head>
  <body>
    <!-- Barre supérieure -->
    <header id="topbar">
      <div id="topbar-left">
        <span id="game-title">3026 – Le Jeu Tip Top</span>
        <span class="sep">|</span>
        <span>🏠 <span id="homeName">—</span></span>
      </div>
      <div id="topbar-resources">
        <div class="top-res">
          🌲 <span id="qty-BOISIUM">—</span>
          <span class="res-max">/ <span id="max-BOISIUM">—</span></span>
        </div>
        <div class="top-res">
          ⚙️ <span id="qty-FERONIUM">—</span>
          <span class="res-max">/ <span id="max-FERONIUM">—</span></span>
          <span class="res-prod" id="prod-FERONIUM"></span>
        </div>
        <div class="top-res">
          ⚫ <span id="qty-CHARBONIUM">—</span>
          <span class="res-max">/ <span id="max-CHARBONIUM">—</span></span>
        </div>
      </div>
      <div id="topbar-right">
        <span>⚡ Mouvements : <strong id="movesLeft">—</strong></span>
      </div>
    </header>

    <!-- Corps principal -->
    <div id="main">
      <!-- Panneau gauche – Upgrades -->
      <aside id="panel-left">
        <section class="panel-card">
          <div class="panel-title">⬆️ Upgrade Entrepôt</div>
          <p id="storageName">—</p>
          <div id="upgrade-cost"></div>
          <button class="btn" id="UPG_storage">⬆️ Upgrader</button>
        </section>

        <section class="panel-card">
          <div class="panel-title">⬆️ Upgrade Bateau</div>
          <p id="boatName">—</p>
          <div id="upgrade-ship-cost"></div>
          <button class="btn-blue" id="UPG_ship">⬆️ Upgrader</button>
        </section>
      </aside>

      <!-- Zone centrale – Carte -->
      <div id="map-area">
        <canvas id="map"></canvas>
        <div id="tooltip" class="tooltip"></div>
      </div>

      <!-- Panneau droit – Marketplace -->
      <aside id="panel-right">
        <section class="panel-card">
          <div class="panel-title">Marketplace</div>
          <div class="upgrade-item">
            <span>💰 Gold</span>
            <span id="currentGold">—</span>
          </div>
          <button class="btn" id="seeOffers">Actualiser les offres</button>
          <div id="offers-panel"></div>
          <button class="btn" id="sell3kf">
            Vendre 1000 Feronium à 15u
          </button>
        </section>
      </aside>
    </div>
  </body>
</html>
